<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="./img/logo_navegador.png">
  <title>Vida Mais - Login</title>
</head>

<body>
  <div class="visor">
    <div class="cabecalho">
      <div class="logo">
        <img id="logo" src="./img/logo.png" alt="Logo da clínica Vida Mais.">
      </div>
      <h1 id="titulo">Bem-vindo à Central de Monitoramento</h1>
    </div>
    <div class="login">
      <div id="login">
        <form action="/login" method="POST">
          <div class="informacoes">
            <div class="input">
              <input id="input" name="usuario" placeholder="Usuário">
            </div>
            <div class="button">
              <button id="button" type="submit">Login</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
